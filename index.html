<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dorfflohmarkt Hangelar</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>


  <header class="hero">

    <div class="hero-content">

        <div class="hero-title">
            <h1 id="veranstaltung">
                🏡 Dorfflohmarkt Hangelar
            </h1>
        </div>

        <div class="event-info">

            <div class="info-box">
                <span>📅</span>
                <p id="datum"></p>
            </div>

            <div class="info-box">
                <span>🕙</span>
                <p id="uhrzeit"></p>
            </div>

            <div class="info-box info-green">
                <span>📍</span>
                <p id="anzahlStaende"></p>
            </div>

        </div>

        <section class="toolbar">

            <div class="toolbar-search">

                <input
                    id="search"
                    type="text"
                    placeholder="🔍 Straße, Stand oder Warengruppe suchen">

            </div>

            <div class="toolbar-buttons">

                <button id="btnRoute">
                    🔄 Karte aktualisieren
                </button>
              

                <button id="btnListe">
                    📋 Stände
                </button>

            </div>

        </section>

    </div>

</header>




<div id="filterBar" class="filter-bar">

    <button onclick="filterWarengruppe('Alle')">Alle</button>
    <button onclick="filterWarengruppe('Baby')">👶 Baby</button>
    <button onclick="filterWarengruppe('Kinderkleidung')">🧒 Kinder</button>
    <button onclick="filterWarengruppe('Spielzeug')">🧸 Spielzeug</button>
    <button onclick="filterWarengruppe('Bücher')">📚 Bücher</button>
    <button onclick="filterWarengruppe('Kleidung')">👕 Kleidung</button>
    <button onclick="filterWarengruppe('Elektronik')">💻 Elektronik</button>
    <button onclick="filterWarengruppe('Haushaltswaren')">🏠 Haushalt</button>
    <button onclick="filterWarengruppe('Deko')">🪴 Deko</button>
    <button onclick="filterWarengruppe('Sonstiges')">📦 Sonstiges</button>

</div>

<section id="map"></section>

<section class="standliste">

    <h2>📋 Standliste</h2>

    <table id="standTable">

        <thead>

            <tr>
                <th>Stand</th>
                <th>Straße</th>
                <th>Warengruppe</th>
                <th>Route</th>
            </tr>

        </thead>

        <tbody></tbody>

    </table>

</section>

<footer>

    © Dorfflohmarkt Hangelar

</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
